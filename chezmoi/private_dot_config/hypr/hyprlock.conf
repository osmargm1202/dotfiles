general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 5
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(8aadf4ee)
    inner_color = rgba(24273add)
    font_color = rgba(cad3f5ff)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%I:%M %p"
    color = rgba(cad3f5ff)
    font_size = 54
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
