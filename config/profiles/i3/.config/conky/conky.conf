-- conky config for i3 (X11)
conky.config = {
    update_interval = 1,
    double_buffer = true,
    alignment = 'top_right',
    gap_x = 20,
    gap_y = 40,
    background = false,
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    default_color = 'white',
    font = 'JetBrainsMono Nerd Font:size=10',
    use_xft = true,
    draw_shades = false,
}
conky.text = [[
${alignr}${time %H:%M:%S}
${alignr}${time %A %d %B}
${alignr}CPU: ${cpu}% | RAM: ${mem}/${memmax}
]]
