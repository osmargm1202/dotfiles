# NOTE: hypridle is NOT started in this profile.
# Caelestia shell manages idle, lock, dpms, and sleep internally via shell.json:
#   general.idle.timeouts[] — configure lock/dpms/suspend timeouts there.
#
# This file is kept only as a fallback reference. If you need to run hypridle
# manually for debugging, it will use caelestia's lock (loginctl lock-session).

general {
    lock_cmd = loginctl lock-session
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

listener {
    timeout = 900
    on-timeout = systemctl suspend
}
