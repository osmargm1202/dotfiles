backend = "glx";
vsync = true;
use-damage = true;

shadow = true;
shadow-radius = 10;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.35;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "fullscreen"
];

fading = true;
fade-delta = 8;
fade-in-step = 0.04;
fade-out-step = 0.04;

inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;

corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "fullscreen"
];

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 3;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "fullscreen"
];

detect-rounded-corners = true;
detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
