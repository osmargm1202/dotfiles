##############################
### WINDOWS AND WORKSPACES ###
##############################

# Hyprland 0.52 legacy windowrule syntax.
# Opacity mirrors SwayFX setup. Third value keeps fullscreen opaque where supported.
windowrule = opacity 0.96 override 0.96 override 1.0 override, class:.*
windowrule = opacity 0.85 override 0.85 override 1.0 override, class:^(kitty)$
windowrule = opacity 0.90 override 0.90 override 1.0 override, class:^(app.zen_browser.zen)$
windowrule = opacity 0.90 override 0.90 override 1.0 override, class:^(zen-browser)$
windowrule = opacity 0.90 override 0.90 override 1.0 override, class:^(chromium)$
windowrule = opacity 0.90 override 0.90 override 1.0 override, class:^(Chromium)$

# Utility windows.
windowrule = float, class:^(org.gnome.Calculator)$
windowrule = size 420 520, class:^(org.gnome.Calculator)$
windowrule = center, class:^(org.gnome.Calculator)$
windowrule = float, class:^(pavucontrol)$
windowrule = size 760 520, class:^(pavucontrol)$
windowrule = center, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = size 760 520, class:^(blueman-manager)$
windowrule = center, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = size 820 560, class:^(nm-connection-editor)$
windowrule = center, class:^(nm-connection-editor)$
windowrule = float, class:^(nwg-displays)$
windowrule = size 980 640, class:^(nwg-displays)$
windowrule = center, class:^(nwg-displays)$
windowrule = float, class:^(org.gnome.FileRoller)$
windowrule = size 820 560, class:^(org.gnome.FileRoller)$
windowrule = center, class:^(org.gnome.FileRoller)$
windowrule = float, modal:1

# Discord starts normally; no forced scratchpad.

windowrule = suppressevent maximize, class:.*
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
