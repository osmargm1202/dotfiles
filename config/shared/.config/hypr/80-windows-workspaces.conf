##############################
### WINDOWS AND WORKSPACES ###
##############################

# Hyprland 0.55 windowrule syntax.
# Effects first/last both parse, but match fields must use match:<field> <value>.
windowrule = match:class .*, opacity 0.96 override 0.96 override 1.0 override
windowrule = match:class ^(kitty)$, opacity 0.85 override 0.85 override 1.0 override
windowrule = match:class ^(app.zen_browser.zen)$, opacity 0.90 override 0.90 override 1.0 override
windowrule = match:class ^(zen-browser)$, opacity 0.90 override 0.90 override 1.0 override
windowrule = match:class ^(chromium)$, opacity 0.90 override 0.90 override 1.0 override
windowrule = match:class ^(Chromium)$, opacity 0.90 override 0.90 override 1.0 override

# Utility windows.
windowrule = match:class ^(org.gnome.Calculator)$, float true
windowrule = match:class ^(org.gnome.Calculator)$, size 420 520
windowrule = match:class ^(org.gnome.Calculator)$, center true
windowrule = match:class ^(pavucontrol)$, float true
windowrule = match:class ^(pavucontrol)$, size 760 520
windowrule = match:class ^(pavucontrol)$, center true
windowrule = match:class ^(blueman-manager)$, float true
windowrule = match:class ^(blueman-manager)$, size 760 520
windowrule = match:class ^(blueman-manager)$, center true
windowrule = match:class ^(nm-connection-editor)$, float true
windowrule = match:class ^(nm-connection-editor)$, size 820 560
windowrule = match:class ^(nm-connection-editor)$, center true
windowrule = match:class ^(nwg-displays)$, float true
windowrule = match:class ^(nwg-displays)$, size 980 640
windowrule = match:class ^(nwg-displays)$, center true
windowrule = match:class ^(org.gnome.FileRoller)$, float true
windowrule = match:class ^(org.gnome.FileRoller)$, size 820 560
windowrule = match:class ^(org.gnome.FileRoller)$, center true
windowrule = match:modal true, float true

# Discord starts normally; no forced scratchpad.

windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_initial_focus true
