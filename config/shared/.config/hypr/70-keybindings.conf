###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Help / launchers.
bind = $mainMod, slash, exec, orgm-hypr menu keybindings
bind = $mainMod CTRL, slash, exec, kitty --hold -e distrobox-enter arch -- tmuxls
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, kitty -e distrobox-enter arch
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, orgm-hypr zen open-new-window
bind = $mainMod, A, exec, orgm-hypr smart-run run
bind = $mainMod SHIFT, A, exec, kitty --class orgmai-chat -e distrobox-enter arch -- orgmai prev
bind = $mainMod SHIFT, R, exec, kitty -e distrobox-enter arch -- orgmrnc find
bind = $mainMod SHIFT, P, exec, $piPrompt

# NWG stack.
bind = $mainMod, Space, exec, $menu
bind = $mainMod ALT, Space, exec, $control_center
bind = $mainMod, M, exec, orgm-hypr file open --launcher fuzzel
bind = $mainMod CTRL, M, exec, orgm-hypr file open-dir --launcher fuzzel
bind = $mainMod SHIFT, M, exec, orgm-hypr file open-terminal --launcher fuzzel
bind = $mainMod, Escape, exec, orgm-hypr windows switch --launcher fuzzel
bind = $mainMod SHIFT, T, exec, orgm-hypr tmux arch --launcher fuzzel
bind = $mainMod, C, exec, orgm-hypr calc fuzzel
bind = $mainMod, D, exec, orgm-hypr ssh host --launcher fuzzel
bind = $mainMod, P, exec, $display_settings
bind = $mainMod CTRL, comma, exec, $display_settings
bind = $mainMod ALT, E, exec, $power_menu
bind = $mainMod ALT, L, exec, $lock
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod CTRL SHIFT, M, exec, swaync-client -C
bind = $mainMod SHIFT, W, exec, orgm-hypr wallpaper pick
bind = $mainMod, V, exec, sh -lc 'cliphist list | fuzzel --dmenu --prompt "Clipboard> " | cliphist decode | wl-copy'
bind = $mainMod, F10, exec, pavucontrol
bind = CTRL, Space, exec, hyprctl switchxkblayout all next

# Scratchpad equivalent: special workspace.
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic
bind = $mainMod CTRL, S, movetoworkspace, current

# Media keys.
bindel = , XF86AudioRaiseVolume, exec, orgm-hypr osd volume up
bindel = , XF86AudioLowerVolume, exec, orgm-hypr osd volume down
bindl = , XF86AudioMute, exec, orgm-hypr osd volume mute
bindel = CTRL, XF86AudioRaiseVolume, exec, orgm-hypr osd mic up
bindel = CTRL, XF86AudioLowerVolume, exec, orgm-hypr osd mic down
bindl = , XF86AudioMicMute, exec, orgm-hypr osd mic mute
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindel = , XF86MonBrightnessUp, exec, orgm-hypr osd brightness up
bindel = , XF86MonBrightnessDown, exec, orgm-hypr osd brightness down
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = CTRL, Print, exec, grim - | swappy -f -
bind = ALT, Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, Print, exec, fish -c record_screen_mp4
bind = $mainMod SHIFT, Print, exec, fish -c record_screen_gif

# Window/session controls.
bind = $mainMod, Tab, exec, hyprctl dispatch 'hl.dsp.focus({ last = true })'
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, orgm-hypr windows kill-menu
bind = $mainMod SHIFT, E, exit
bind = CTRL ALT, Delete, exit
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod, T, layoutmsg, togglesplit
bind = $mainMod, C, centerwindow
bind = $mainMod, R, layoutmsg, togglesplit
bind = $mainMod CTRL, R, layoutmsg, togglesplit
# Group navigation (tabbed windows): Win+` next, Win+Shift+` back
bind = $mainMod, grave, changegroupactive, f
bind = $mainMod SHIFT, grave, changegroupactive, b

# Resize active window
bind = $mainMod CTRL, minus, resizeactive, -20 0
bind = $mainMod CTRL, equal, resizeactive, 20 0
bind = $mainMod SHIFT, minus, resizeactive, 0 -20
bind = $mainMod SHIFT, equal, resizeactive, 0 20

# Grouping (tabbed windows).
bind = $mainMod, G, togglegroup

# Focus / move.
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r


bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, down, movewindow, d
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, j, movewindow, d
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, l, movewindow, r

# Workspaces.
bind = $mainMod, Home, workspace, 1
bind = $mainMod, End, workspace, 10
bind = $mainMod CTRL, Home, movetoworkspace, 1
bind = $mainMod CTRL, End, movetoworkspace, 10
bind = $mainMod, Page_Down, workspace, r-1
bind = $mainMod, Page_Up, workspace, r+1
bind = $mainMod, U, workspace, r-1
bind = $mainMod, I, workspace, r+1
bind = $mainMod CTRL, Page_Down, movetoworkspace, r-1
bind = $mainMod CTRL, Page_Up, movetoworkspace, r+1
bind = $mainMod CTRL, U, movetoworkspace, r-1
bind = $mainMod CTRL, I, movetoworkspace, r+1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
