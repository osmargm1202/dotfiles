###################
### AUTOSTART ###
###################

exec-once = systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_SESSION_TYPE XDG_SESSION_DESKTOP XDG_CURRENT_DESKTOP QT_QPA_PLATFORM QT_QPA_PLATFORMTHEME QT_QPA_PLATFORMTHEME_QT6 ELECTRON_OZONE_PLATFORM_HINT MOZ_ENABLE_WAYLAND NIXOS_OZONE_WL TERMINAL XCURSOR_THEME XCURSOR_SIZE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_SESSION_TYPE XDG_SESSION_DESKTOP XDG_CURRENT_DESKTOP QT_QPA_PLATFORM QT_QPA_PLATFORMTHEME QT_QPA_PLATFORMTHEME_QT6 ELECTRON_OZONE_PLATFORM_HINT MOZ_ENABLE_WAYLAND NIXOS_OZONE_WL TERMINAL XCURSOR_THEME XCURSOR_SIZE
exec-once = systemctl --user start graphical-session.target

# Waybar replaces NWG panel.
exec-once = ~/.local/bin/waybar-watch ~/.config/waybar-hypr
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11,ssh
exec-once = hyprpolkitagent
exec-once = sh -lc '$HOME/.local/bin/hypr-random-wallpaper daemon'
exec-once = nextcloud --background
exec-once = sh -lc 'if command -v docker >/dev/null 2>&1; then docker start arch windows >/dev/null 2>&1 || true; elif command -v podman >/dev/null 2>&1; then podman start arch windows >/dev/null 2>&1 || true; fi'
exec-once = sh -lc 'if command -v discord >/dev/null 2>&1; then discord --start-minimized; elif command -v flatpak >/dev/null 2>&1 && flatpak info com.discordapp.Discord >/dev/null 2>&1; then flatpak run com.discordapp.Discord --start-minimized; fi'
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
