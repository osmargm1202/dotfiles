conky.config = {
    out_to_wayland = true,
    out_to_x = false,

    -- own_window_transparent=true makes clear_text() fill with alpha=0 (transparent)
    -- without this conky fills background with background_colour (default black)
    own_window_transparent = true,

    alignment = 'top_left',
    gap_x = 1472,
    gap_y = 280,

    minimum_width = 316,
    maximum_width = 316,
    minimum_height = 420,

    font = 'JetBrainsMono Nerd Font:size=13',

    default_color = 'cad3f5',
    color1 = '8bd5ca',
    color2 = 'c6a0f6',
    color3 = 'a6da95',
    color4 = 'eed49f',
    color5 = 'f5a97f',
    color6 = 'ed8796',
    color7 = 'a5adcb',
    color8 = 'b7bdf8',

    update_interval = 2,
    double_buffer = true,
    no_buffers = true,
    draw_shades = true,
    draw_outline = false,
    draw_borders = false,
    border_width = 0,
    default_bar_height = 18,
    default_bar_width = 290,
    cpu_avg_samples = 3,
    temperature_unit = 'celsius',
    top_name_width = 14,
}

conky.text = [[
${voffset 8}${color1}${font JetBrainsMono Nerd Font:bold:size=13}  CPU${font}${color}  ${color7}${freq_g}GHz${color}${alignr}${color6}${font JetBrainsMono Nerd Font:size=13}${acpitemp}°C  ${font}${color}${color1}${font JetBrainsMono Nerd Font:bold:size=22}${cpu cpu0}%${font}${color}
${voffset 2}${color1}${cpubar cpu0 18,290}${color}
${voffset 14}${color2}${font JetBrainsMono Nerd Font:bold:size=13}  GPU${font}${color}  ${color7}${exec ~/.local/bin/conky-gpu-stat clock}${color}${alignr}${color6}${font JetBrainsMono Nerd Font:size=13}${exec ~/.local/bin/conky-gpu-stat temp}°C  ${font}${color}${color2}${font JetBrainsMono Nerd Font:bold:size=22}${exec ~/.local/bin/conky-gpu-stat util}%${font}${color}
${voffset 2}${color2}${execbar ~/.local/bin/conky-gpu-stat util}${color}
${voffset 14}${color3}${font JetBrainsMono Nerd Font:bold:size=13}  RAM${font}${color}  ${color7}${mem} / ${memmax}${color}${alignr}${color3}${font JetBrainsMono Nerd Font:bold:size=22}${memperc}%${font}${color}
${voffset 2}${color3}${membar 18,290}${color}
${voffset 14}${color4}${font JetBrainsMono Nerd Font:bold:size=13}󰆼  SWAP${font}${color}  ${color7}${swap} / ${swapmax}${color}${alignr}${color4}${font JetBrainsMono Nerd Font:bold:size=22}${swapperc}%${font}${color}
${voffset 2}${color4}${swapbar 18,290}${color}
${voffset 14}${color5}${font JetBrainsMono Nerd Font:bold:size=13}󰋊  SSD${font}${color}  ${color7}${fs_used /} / ${fs_size /}${color}${alignr}${color5}${font JetBrainsMono Nerd Font:bold:size=22}${fs_used_perc /}%${font}${color}
${voffset 2}${color5}${fs_bar 18,290 /}${color}
${voffset 8}
]]
