local _colors = {}
do
  local cfg = os.getenv("XDG_CONFIG_HOME") or (os.getenv("HOME") .. "/.config")
  local ok, v = pcall(dofile, cfg .. "/conky/orgm-colors.lua")
  if ok and type(v) == "table" then _colors = v end
end
local function col(k, fb) return _colors[k] or fb end

conky.config = {
    out_to_x = true,
    out_to_wayland = false,
    own_window = true,
    own_window_type = 'normal',
    own_window_colour = '000000',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 60,
    own_window_class = 'conky-overlay',
    own_window_title = 'conky-overlay',

    alignment = 'top_left',
    gap_x = 1554,
    gap_y = 130,

    minimum_width = 256,
    maximum_width = 256,
    minimum_height = 0,

    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=13',
    xftalpha = 1.0,

    default_color = col('text',      'cad3f5'),
    color1        = col('accent',    '8aadf4'),
    color2        = col('secondary', 'a5adcb'),

    update_interval = 1,
    double_buffer = true,
    draw_shades = true,
    draw_outline = true,
    draw_borders = false,
    border_width = 0,
}

conky.text = [[
${voffset 10}${color1}${font JetBrainsMono Nerd Font:bold:size=15}${alignc}${exec LANG=es_DO.utf8 date "+%A"}${font}${color}
${color2}${font JetBrainsMono Nerd Font:size=13}${alignc}${exec LANG=es_DO.utf8 date "+%B"}${font}${color}
${voffset 6}${color1}${font JetBrainsMono Nerd Font:bold:size=42}${alignc}${exec date "+%I:%M"}${font}${color}
${voffset 4}${color2}${font JetBrainsMono Nerd Font:size=14}${alignc}${exec date "+%d / %m / %Y"}${font}${color}
${voffset 8}
]]
