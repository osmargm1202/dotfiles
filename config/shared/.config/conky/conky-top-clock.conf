conky.config = {
    out_to_x = true,
    out_to_wayland = false,
    own_window = true,
    own_window_type = 'normal',
    own_window_colour = '000000',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 60,
    own_window_class = 'conky-overlay',
    own_window_title = 'conky-overlay',

    alignment = 'top_left',
    gap_x = 1544,
    gap_y = 120,

    minimum_width = 256,
    maximum_width = 256,
    minimum_height = 0,

    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=13',
    xftalpha = 1.0,

    default_color = 'cad3f5',
    color7 = 'ffffff',
    color8 = 'b7bdf8',

    update_interval = 1,
    double_buffer = true,
    draw_shades = true,
    draw_outline = true,
    draw_borders = false,
    border_width = 0,
}

conky.text = [[
${voffset 10}${color8}${font JetBrainsMono Nerd Font:bold:size=15}${alignc}${exec LANG=es_DO.utf8 date "+%A"}${font}${color}
${color7}${font JetBrainsMono Nerd Font:size=13}${alignc}${exec LANG=es_DO.utf8 date "+%B"}${font}${color}
${voffset 6}${color8}${font JetBrainsMono Nerd Font:bold:size=42}${alignc}${exec date "+%I:%M"}${font}${color}
${voffset 4}${color7}${font JetBrainsMono Nerd Font:size=14}${alignc}${exec date "+%d / %m / %Y"}${font}${color}
${voffset 8}
]]
