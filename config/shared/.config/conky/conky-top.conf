conky.config = {
    -- XWayland window (wlr-layer-shell not compiled in this nixpkgs build)
    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_class = 'conky-stats',
    own_window_title = 'conky-stats-top',

    alignment = 'top_left',
    gap_x = 38,
    gap_y = 90,

    minimum_width = 320,
    maximum_width = 320,
    minimum_height = 0,

    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=12',
    xftalpha = 1.0,

    -- Colors (Catppuccin Macchiato)
    default_color = 'cad3f5',
    color1 = '8bd5ca',   -- teal:   CPU
    color2 = 'c6a0f6',   -- mauve:  GPU
    color3 = 'a6da95',   -- green:  RAM
    color4 = 'eed49f',   -- yellow: SWAP
    color5 = 'f5a97f',   -- peach:  SSD
    color6 = 'ed8796',   -- red:    temp warning
    color7 = 'a5adcb',   -- subtext
    color8 = 'b7bdf8',   -- lavender: clock

    update_interval = 2,
    double_buffer = true,
    no_buffers = true,
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    border_width = 0,
    default_bar_height = 20,
    default_bar_width = 320,
    cpu_avg_samples = 3,
    temperature_unit = 'celsius',
    short_units = false,
    top_name_width = 14,
}

conky.text = [[
${color8}${font JetBrainsMono Nerd Font:bold:size=13}${alignc}${exec LANG=es_ES.utf8 date "+%A - %B"}${font}${color}
${color8}${font JetBrainsMono Nerd Font:bold:size=28}${alignc}${exec date "+%I:%M %p"}${font}${color}
${color7}${font JetBrainsMono Nerd Font:size=13}${alignc}${exec date "+%d/%m/%Y"}${font}${color}
${color1}${hr 1}${color}
${color1}${font JetBrainsMono Nerd Font:bold:size=12}  CPU${font}${color}  ${color7}${freq_g}GHz${color}${alignr}${color6}${font JetBrainsMono Nerd Font:size=12}${acpitemp}°C  ${font}${color}${color1}${font JetBrainsMono Nerd Font:bold:size=20}${cpu cpu0}%${font}${color}
${color1}${cpubar cpu0 20,320}${color}
${color2}${font JetBrainsMono Nerd Font:bold:size=12}  GPU${font}${color}  ${color7}${exec ~/.local/bin/conky-gpu-stat clock}${color}${alignr}${color6}${font JetBrainsMono Nerd Font:size=12}${exec ~/.local/bin/conky-gpu-stat temp}°C  ${font}${color}${color2}${font JetBrainsMono Nerd Font:bold:size=20}${exec ~/.local/bin/conky-gpu-stat util}%${font}${color}
${color2}${execbar ~/.local/bin/conky-gpu-stat util}${color}
${color3}${font JetBrainsMono Nerd Font:bold:size=12}  RAM${font}${color}  ${color7}${mem} / ${memmax}${color}${alignr}${color3}${font JetBrainsMono Nerd Font:bold:size=20}${memperc}%${font}${color}
${color3}${membar 20,320}${color}
${color4}${font JetBrainsMono Nerd Font:bold:size=12}󰆼  SWAP${font}${color}  ${color7}${swap} / ${swapmax}${color}${alignr}${color4}${font JetBrainsMono Nerd Font:bold:size=20}${swapperc}%${font}${color}
${color4}${swapbar 20,320}${color}
${color5}${font JetBrainsMono Nerd Font:bold:size=12}󰋊  SSD${font}${color}  ${color7}${fs_used /} / ${fs_size /}${color}${alignr}${color5}${font JetBrainsMono Nerd Font:bold:size=20}${fs_used_perc /}%${font}${color}
${color5}${fs_bar 20,320 /}${color}
${color1}${hr 1}${color}
${color7}${font JetBrainsMono Nerd Font:size=10}  APP${alignr}CPU%  MEM%${font}${color}
${color7}${font JetBrainsMono Nerd Font:size=11}  ${top name 1}${alignr}${top cpu 1}%  ${top mem 1}%
  ${top name 2}${alignr}${top cpu 2}%  ${top mem 2}%
  ${top name 3}${alignr}${top cpu 3}%  ${top mem 3}%${font}${color}
]]
